<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horse Business Management Sim</title>
    <style>
      :root {
        --bg: #081f45;
        --bg-2: #10356f;
        --card: #123f82;
        --card-soft: #0f3369;
        --text: #eaf2ff;
        --muted: #bfd2f4;
        --accent: #67b0ff;
        --danger: #ff7d7d;
        --ok: #61d9a1;
        --warn: #ffd37d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, var(--bg-2), var(--bg) 60%);
      }
      .container { max-width: 1240px; margin: 1rem auto 2rem; padding: 0 1rem; }
      .shell {
        background: linear-gradient(180deg, #15478f, #123a74);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 16px;
        box-shadow: 0 14px 34px rgba(0,0,0,0.35);
        overflow: hidden;
      }
      .topbar {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        padding: 0.9rem 1rem;
        background: rgba(8, 26, 57, 0.35);
      }
      .kpis { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      .pill {
        background: rgba(255,255,255,0.09);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
        font-size: 0.85rem;
      }
      .tabs { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 0.5rem; padding: 0.8rem 1rem; }
      .tab {
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 999px;
        background: #0d336d;
        color: var(--text);
        padding: 0.5rem 0.65rem;
        font-weight: 700;
        cursor: pointer;
      }
      .tab.active { background: var(--accent); color: #07224f; border-color: transparent; }
      .content { padding: 0 1rem 1rem; }
      .panel { display: none; }
      .panel.active { display: block; }
      .grid { display: grid; gap: 0.8rem; grid-template-columns: repeat(2,minmax(0,1fr)); }
      .grid-3 { display: grid; gap: 0.8rem; grid-template-columns: repeat(3,minmax(0,1fr)); }
      .card {
        background: linear-gradient(180deg, var(--card), var(--card-soft));
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 14px;
        padding: 0.8rem;
      }
      button {
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        padding: 0.45rem 0.55rem;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-primary { background: var(--accent); color: #06214c; border-color: transparent; }
      .btn-danger { background: var(--danger); color: #4b0808; border-color: transparent; }
      .btn-ok { background: var(--ok); color: #083726; border-color: transparent; }
      .btn-warn { background: var(--warn); color: #543d06; border-color: transparent; }
      .muted { color: var(--muted); font-size: 0.9rem; }
      .toolbar { display: flex; gap: 0.6rem; flex-wrap: wrap; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { border-bottom: 1px solid rgba(255,255,255,0.12); padding: 0.4rem 0.3rem; text-align: left; }
      .log { max-height: 260px; overflow: auto; }
      select, input {
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        padding: 0.45rem 0.55rem;
      }
      @media (max-width: 980px) {
        .tabs { grid-template-columns: repeat(3, minmax(0,1fr)); }
        .grid, .grid-3 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="shell">
        <header class="topbar">
          <div>
            <h1 style="margin:0;">Horse Business Management Sim</h1>
            <div class="muted">Market + genetics driven horse business</div>
          </div>
          <div class="kpis">
            <span class="pill" id="kpiDate"></span>
            <span class="pill" id="kpiCash"></span>
            <span class="pill" id="kpiRep"></span>
            <span class="pill" id="kpiMarket"></span>
          </div>
          <div class="toolbar">
            <button id="skipMonthBtn" class="btn-warn">Skip Month</button>
            <button id="saveBtn">Save</button>
            <button id="loadBtn">Load</button>
            <button id="newGameBtn" class="btn-danger">New Game</button>
          </div>
        </header>

        <nav class="tabs">
          <button class="tab active" data-tab="horses">Horses</button>
          <button class="tab" data-tab="sales">Sales</button>
          <button class="tab" data-tab="breeding">Breeding</button>
          <button class="tab" data-tab="staff">Staff</button>
          <button class="tab" data-tab="barn">Barn</button>
          <button class="tab" data-tab="finance">Finance</button>
        </nav>

        <section class="content">
          <article class="panel active" id="panel-horses">
            <div class="card">
              <div class="row">
                <h2 style="margin:0;">Player Horses</h2>
                <div>
                  <label for="horseFilter">Filter</label>
                  <select id="horseFilter">
                    <option value="All">All</option>
                    <option value="Young">Young</option>
                    <option value="Active">Active</option>
                    <option value="Breeding">Breeding</option>
                  </select>
                </div>
              </div>
              <div id="horsesList" class="grid-3" style="margin-top:0.8rem;"></div>
            </div>
          </article>

          <article class="panel" id="panel-sales">
            <div class="card">
              <div class="row">
                <h2 style="margin:0;">NPC Horse Market</h2>
                <button id="refreshMarketBtn" class="btn-primary">Refresh Market</button>
              </div>
              <div id="marketList" class="grid-3" style="margin-top:0.8rem;"></div>
            </div>
          </article>

          <article class="panel" id="panel-breeding">
            <div class="grid">
              <div class="card">
                <h2>Breeding Pairs</h2>
                <div class="muted">Only horses in Breeding status can reproduce. One breeding per mare per year.</div>
                <div id="breedingPairs" class="log" style="margin-top:0.8rem;"></div>
              </div>
              <div class="card">
                <h2>Breeding Log</h2>
                <div id="breedingLog" class="log"></div>
              </div>
            </div>
          </article>

          <article class="panel" id="panel-staff">
            <div class="card">
              <h2>Staff</h2>
              <div id="staffTableWrap"></div>
            </div>
          </article>

          <article class="panel" id="panel-barn">
            <div class="grid">
              <div class="card">
                <h2>Barn Capacity</h2>
                <div id="barnSummary"></div>
              </div>
              <div class="card">
                <h2>Event Log</h2>
                <div id="eventLog" class="log"></div>
              </div>
            </div>
          </article>

          <article class="panel" id="panel-finance">
            <div class="card">
              <h2>Finance</h2>
              <div id="financeSummary"></div>
            </div>
          </article>
        </section>
      </section>
    </main>

    <script>
      const STORE_KEY = 'horseBusinessState_v3';
      const STATS = ['conformation', 'movement', 'scope', 'rideability', 'temperament', 'soundness', 'bloodlinePrestige'];
      const BREEDS = ['Warmblood', 'Thoroughbred', 'Hanoverian', 'Dutch Warmblood', 'Oldenburg'];
      const DISCIPLINES = ['Dressage', 'Showjumping', 'Eventing'];
      const MALE_NAMES = ['Atlas', 'Comet', 'Ranger', 'Noble', 'Zephyr', 'Orion'];
      const FEMALE_NAMES = ['Aurora', 'Willow', 'Dahlia', 'Iris', 'Sable', 'Nova'];

      class Horse {
        constructor(data) {
          this.id = data.id;
          this.name = data.name;
          this.age = data.age;
          this.gender = data.gender;
          this.breed = data.breed;
          this.discipline = data.discipline;
          this.status = data.status;
          this.owner = data.owner;
          this.stats = data.stats;
          this.parentIds = data.parentIds || [];
          this.fatigue = data.fatigue || 0;
          this.injured = data.injured || false;
          this.lastBredYear = data.lastBredYear || null;
        }

        primaryDisciplineStat() {
          if (this.discipline === 'Dressage') return this.stats.movement;
          if (this.discipline === 'Showjumping') return this.stats.scope;
          return Math.round((this.stats.movement + this.stats.scope) / 2);
        }

        calculateValue(marketCondition = 1) {
          const base = (this.stats.conformation + this.primaryDisciplineStat() + this.stats.bloodlinePrestige) * 2000;
          const temperamentMod = 0.75 + this.stats.temperament * 0.05;
          const soundnessMod = 0.7 + this.stats.soundness * 0.06;
          return Math.round(base * temperamentMod * soundnessMod * marketCondition);
        }

        train(level) {
          const profile = {
            basic: { chance: 0.25, fatigue: 6, injuryRisk: 0.02 },
            professional: { chance: 0.4, fatigue: 10, injuryRisk: 0.04 },
            elite: { chance: 0.55, fatigue: 14, injuryRisk: 0.07 }
          }[level];

          this.fatigue = Math.min(100, this.fatigue + profile.fatigue);
          const key = this.discipline === 'Dressage' ? 'movement' : this.discipline === 'Showjumping' ? 'scope' : (Math.random() < 0.5 ? 'movement' : 'scope');

          let improved = false;
          if (Math.random() < profile.chance && this.stats[key] < 10) {
            this.stats[key] += 1;
            improved = true;
          }

          if (Math.random() < profile.injuryRisk) this.injured = true;
          return { improved, key, injured: this.injured };
        }

        breed(partner, foalId) {
          const foalStats = {};
          for (const stat of STATS) {
            const avg = (this.stats[stat] + partner.stats[stat]) / 2;
            let value = Math.round(avg + (Math.random() * 2 - 1));
            if (Math.random() < 0.05) value += Math.random() < 0.5 ? -2 : 2;
            foalStats[stat] = Math.max(1, Math.min(10, value));
          }
          return new Horse({
            id: foalId,
            name: generateHorseName(Math.random() < 0.5 ? 'Mare' : 'Stallion'),
            age: 0,
            gender: Math.random() < 0.5 ? 'Mare' : 'Stallion',
            breed: this.breed,
            discipline: Math.random() < 0.5 ? this.discipline : partner.discipline,
            status: 'Young',
            owner: 'player',
            stats: foalStats,
            parentIds: [this.id, partner.id],
            fatigue: 0,
            injured: false,
            lastBredYear: null
          });
        }
      }

      class Market {
        generateHorses(count, state) {
          const horses = [];
          for (let i = 0; i < count; i += 1) {
            const gender = Math.random() < 0.5 ? 'Mare' : 'Stallion';
            const horse = new Horse({
              id: state.nextHorseId++,
              name: generateHorseName(gender),
              age: randomInt(2, 12),
              gender,
              breed: pick(BREEDS),
              discipline: pick(DISCIPLINES),
              status: 'Active',
              owner: 'npc',
              stats: randomStats(),
              parentIds: [],
              fatigue: randomInt(0, 15),
              injured: false,
              lastBredYear: null
            });
            horses.push(horse);
          }
          return horses;
        }

        refresh(state) {
          const amount = randomInt(5, 15);
          const horses = this.generateHorses(amount, state);
          horses.forEach((horse) => {
            state.horses.push(horse);
            state.market.push(horse.id);
          });
          console.log('[market] refreshed with horses:', state.market.length);
        }
      }

      const marketSystem = new Market();

      function defaultState() {
        return {
          cash: 320000,
          reputation: 25,
          year: 1,
          month: 1,
          nextHorseId: 1,
          horses: [],
          staff: [],
          market: [],
          playerHorseIds: [],
          marketCondition: 1,
          logs: [],
          breedingLogs: []
        };
      }

      let gameState = null;

      function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
      function pick(list) { return list[randomInt(0, list.length - 1)]; }
      function money(value) { return `€${Math.round(value).toLocaleString()}`; }

      function randomStats() {
        return {
          conformation: randomInt(3, 9), movement: randomInt(3, 9), scope: randomInt(3, 9),
          rideability: randomInt(3, 9), temperament: randomInt(3, 9), soundness: randomInt(3, 9), bloodlinePrestige: randomInt(3, 9)
        };
      }

      function generateHorseName(gender) {
        const name = gender === 'Mare' ? pick(FEMALE_NAMES) : pick(MALE_NAMES);
        return `${name} ${String.fromCharCode(65 + randomInt(0, 25))}${randomInt(10, 99)}`;
      }

      function serializeState(state) {
        return JSON.stringify(state);
      }

      function hydrateState(raw) {
        const merged = { ...defaultState(), ...raw };
        merged.horses = merged.horses.map((h) => new Horse(h));
        return merged;
      }

      function createStarterGame() {
        const state = defaultState();
        const starterHorses = [
          new Horse({
            id: state.nextHorseId++, name: 'Aurora Start', age: 3, gender: 'Mare', breed: 'Warmblood', discipline: 'Dressage',
            status: 'Active', owner: 'player', stats: { conformation: 6, movement: 7, scope: 5, rideability: 7, temperament: 7, soundness: 7, bloodlinePrestige: 6 }, parentIds: []
          }),
          new Horse({
            id: state.nextHorseId++, name: 'Atlas Start', age: 5, gender: 'Stallion', breed: 'Hanoverian', discipline: 'Showjumping',
            status: 'Breeding', owner: 'player', stats: { conformation: 7, movement: 6, scope: 8, rideability: 6, temperament: 6, soundness: 7, bloodlinePrestige: 7 }, parentIds: []
          }),
          new Horse({
            id: state.nextHorseId++, name: 'Willow Start', age: 4, gender: 'Mare', breed: 'Dutch Warmblood', discipline: 'Eventing',
            status: 'Breeding', owner: 'player', stats: { conformation: 7, movement: 7, scope: 7, rideability: 6, temperament: 7, soundness: 6, bloodlinePrestige: 7 }, parentIds: []
          })
        ];
        starterHorses.forEach((horse) => {
          state.horses.push(horse);
          state.playerHorseIds.push(horse.id);
        });
        state.staff = [
          { id: 1, name: 'Elena Novak', role: 'Barn Manager', salary: 52000, skill: 8 },
          { id: 2, name: 'Marc Dubois', role: 'Rider', salary: 47000, skill: 7 }
        ];
        marketSystem.refresh(state);
        return state;
      }

      function saveGame() {
        localStorage.setItem(STORE_KEY, serializeState(gameState));
        console.log('[state] saved', gameState);
      }

      function loadGame() {
        const saved = localStorage.getItem(STORE_KEY);
        if (!saved) {
          gameState = createStarterGame();
          saveGame();
          return;
        }
        try {
          gameState = hydrateState(JSON.parse(saved));
        } catch {
          gameState = createStarterGame();
          saveGame();
        }
      }

      function setTab(tabName) {
        document.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.tab === tabName));
        document.querySelectorAll('.panel').forEach((panel) => panel.classList.toggle('active', panel.id === `panel-${tabName}`));
      }

      function getHorseById(id) {
        return gameState.horses.find((h) => h.id === Number(id));
      }

      function playerHorses() {
        return gameState.playerHorseIds.map(getHorseById).filter(Boolean);
      }

      function marketHorses() {
        return gameState.market.map(getHorseById).filter(Boolean);
      }

      function updateKPIs() {
        document.getElementById('kpiDate').textContent = `Date: ${gameState.month}/${gameState.year}`;
        document.getElementById('kpiCash').textContent = `Cash: ${money(gameState.cash)}`;
        document.getElementById('kpiRep').textContent = `Reputation: ${gameState.reputation}`;
        document.getElementById('kpiMarket').textContent = `Market x${gameState.marketCondition.toFixed(2)}`;
      }

      function renderHorses() {
        const filter = document.getElementById('horseFilter').value;
        const horses = playerHorses().filter((h) => filter === 'All' || h.status === filter);
        const html = horses.map((horse) => {
          const value = horse.calculateValue(gameState.marketCondition);
          const injuredTag = horse.injured ? '<div style="color:#ff9f9f;">Injured</div>' : '';
          const trainButtons = horse.status === 'Active'
            ? `<div class="toolbar"><button data-train="${horse.id}" data-level="basic">Train Basic</button><button data-train="${horse.id}" data-level="professional">Train Professional</button><button data-train="${horse.id}" data-level="elite">Train Elite</button></div>`
            : '';
          return `<div class="card">
            <h3 style="margin:0;">${horse.name}</h3>
            <div>${horse.age}y • ${horse.gender} • ${horse.breed} • ${horse.discipline}</div>
            <div>Status: ${horse.status}</div>
            <div>Value: ${money(value)}</div>
            <div>Stats C${horse.stats.conformation} M${horse.stats.movement} S${horse.stats.scope} R${horse.stats.rideability} T${horse.stats.temperament} So${horse.stats.soundness} B${horse.stats.bloodlinePrestige}</div>
            <div>Fatigue: ${horse.fatigue}</div>
            ${injuredTag}
            ${trainButtons}
          </div>`;
        }).join('');
        document.getElementById('horsesList').innerHTML = html || '<div class="muted">No horses match this filter.</div>';
      }

      function renderMarket() {
        const html = marketHorses().map((horse) => {
          const price = horse.calculateValue(gameState.marketCondition);
          return `<div class="card">
            <h3 style="margin:0;">${horse.name}</h3>
            <div>${horse.age}y • ${horse.gender} • ${horse.breed} • ${horse.discipline}</div>
            <div>Stats C${horse.stats.conformation} M${horse.stats.movement} S${horse.stats.scope} R${horse.stats.rideability} T${horse.stats.temperament} So${horse.stats.soundness} B${horse.stats.bloodlinePrestige}</div>
            <div><strong>Price: ${money(price)}</strong></div>
            <button class="btn-primary" data-buy="${horse.id}">Buy</button>
          </div>`;
        }).join('');
        document.getElementById('marketList').innerHTML = html || '<div class="muted">Market is empty. Refresh it.</div>';
      }

      function renderStaff() {
        const rows = gameState.staff.map((s) => `<tr><td>${s.name}</td><td>${s.role}</td><td>${s.skill}</td><td>${money(s.salary)}</td></tr>`).join('');
        document.getElementById('staffTableWrap').innerHTML = `<table><thead><tr><th>Name</th><th>Role</th><th>Skill</th><th>Salary</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      function renderBarn() {
        document.getElementById('barnSummary').innerHTML = `
          <p>Total Horses: ${gameState.horses.length}</p>
          <p>Player Owned: ${gameState.playerHorseIds.length}</p>
          <p>Market Horses: ${gameState.market.length}</p>
        `;
        document.getElementById('eventLog').innerHTML = gameState.logs.map((l) => `<div>• ${l}</div>`).join('');
      }

      function renderFinance() {
        const playerValue = playerHorses().reduce((sum, horse) => sum + horse.calculateValue(gameState.marketCondition), 0);
        document.getElementById('financeSummary').innerHTML = `
          <p>Cash: ${money(gameState.cash)}</p>
          <p>Horse Assets: ${money(playerValue)}</p>
          <p>Reputation: ${gameState.reputation}</p>
          <p>Date: ${gameState.month}/${gameState.year}</p>
          <p>Market Condition Multiplier: ${gameState.marketCondition.toFixed(2)}</p>
        `;
      }

      function renderBreeding() {
        const breedingHorses = playerHorses().filter((h) => h.status === 'Breeding');
        const mares = breedingHorses.filter((h) => h.gender === 'Mare');
        const stallions = breedingHorses.filter((h) => h.gender === 'Stallion');

        let html = '';
        mares.forEach((mare) => {
          stallions.forEach((stallion) => {
            const blocked = mare.lastBredYear === gameState.year;
            html += `<div class="card" style="margin-bottom:0.6rem;">
              <div><strong>Mare:</strong> ${mare.name} × <strong>Stallion:</strong> ${stallion.name}</div>
              <div>${blocked ? 'Mare already bred this year.' : 'Compatible pair ready.'}</div>
              <button class="btn-ok" data-breed="${mare.id}" data-stallion="${stallion.id}" ${blocked ? 'disabled' : ''}>Breed</button>
            </div>`;
          });
        });

        if (!html) html = '<div class="muted">Need at least one mare and one stallion in Breeding status.</div>';
        document.getElementById('breedingPairs').innerHTML = html;
        document.getElementById('breedingLog').innerHTML = gameState.breedingLogs.map((l) => `<div>• ${l}</div>`).join('');
      }

      function renderAll() {
        updateKPIs();
        renderHorses();
        renderStaff();
        renderMarket();
        renderBarn();
        renderFinance();
        renderBreeding();
      }

      function logEvent(msg) {
        gameState.logs.unshift(`[${gameState.month}/${gameState.year}] ${msg}`);
        gameState.logs = gameState.logs.slice(0, 120);
        console.log('[event]', msg);
      }

      function buyHorse(horseId) {
        const horse = getHorseById(horseId);
        if (!horse || horse.owner !== 'npc') return;
        const price = horse.calculateValue(gameState.marketCondition);
        if (gameState.cash < price) {
          alert('Insufficient cash to buy this horse.');
          logEvent(`Purchase failed for ${horse.name} (insufficient cash).`);
          console.log('[purchase] failed', horse.name);
          return;
        }
        gameState.cash -= price;
        horse.owner = 'player';
        horse.status = horse.age <= 2 ? 'Young' : 'Active';
        gameState.playerHorseIds.push(horse.id);
        gameState.market = gameState.market.filter((id) => id !== horse.id);
        gameState.reputation += 1;
        logEvent(`Bought ${horse.name} for ${money(price)}.`);
        console.log('[purchase] success', horse.name, price);
        saveGame();
        renderAll();
      }

      function breedPair(mareId, stallionId) {
        const mare = getHorseById(mareId);
        const stallion = getHorseById(stallionId);
        if (!mare || !stallion) return;
        if (mare.lastBredYear === gameState.year) return;
        const foal = mare.breed(stallion, gameState.nextHorseId++);
        mare.lastBredYear = gameState.year;
        gameState.horses.push(foal);
        gameState.playerHorseIds.push(foal.id);
        const log = `Foal ${foal.name} born from ${mare.name} x ${stallion.name}.`;
        gameState.breedingLogs.unshift(`[${gameState.month}/${gameState.year}] ${log}`);
        gameState.breedingLogs = gameState.breedingLogs.slice(0, 80);
        gameState.reputation += 2;
        logEvent(log);
        console.log('[breeding] new foal', foal);
        saveGame();
        renderAll();
      }

      function trainHorse(horseId, level) {
        const horse = getHorseById(horseId);
        if (!horse || horse.status !== 'Active') return;
        const result = horse.train(level);
        logEvent(`${horse.name} ${level} training: ${result.improved ? `+1 ${result.key}` : 'no stat gain'}${result.injured ? ', injured' : ''}.`);
        if (result.improved) gameState.reputation += 1;
        console.log('[training]', horse.name, result);
        saveGame();
        renderAll();
      }

      function refreshMarket() {
        gameState.market.forEach((id) => {
          const horse = getHorseById(id);
          if (horse) horse.owner = 'archived';
        });
        gameState.market = [];
        marketSystem.refresh(gameState);
        logEvent('Market refreshed with new NPC horses.');
        saveGame();
        renderAll();
      }

      function advanceMonth() {
        gameState.month += 1;
        if (gameState.month > 12) {
          gameState.month = 1;
          gameState.year += 1;
          gameState.marketCondition = Number((0.85 + Math.random() * 0.35).toFixed(2));
          gameState.horses.forEach((h) => {
            h.age += 1;
            h.fatigue = Math.max(0, h.fatigue - 8);
            if (Math.random() < 0.2) h.injured = false;
          });
          logEvent(`New year started. Market condition changed to x${gameState.marketCondition.toFixed(2)}.`);
          console.log('[year advancement]', gameState.year, gameState.marketCondition);
        } else {
          logEvent('Month advanced.');
        }
        saveGame();
        renderAll();
      }

      document.addEventListener('DOMContentLoaded', function () {
        loadGame();
        renderAll();

        document.querySelectorAll('.tab').forEach((tab) => {
          tab.addEventListener('click', () => setTab(tab.dataset.tab));
        });

        document.getElementById('horseFilter').addEventListener('change', renderHorses);
        document.getElementById('skipMonthBtn').addEventListener('click', advanceMonth);
        document.getElementById('refreshMarketBtn').addEventListener('click', refreshMarket);
        document.getElementById('saveBtn').addEventListener('click', () => {
          saveGame();
          logEvent('Manual save complete.');
          renderBarn();
        });
        document.getElementById('loadBtn').addEventListener('click', () => {
          loadGame();
          logEvent('Save loaded.');
          renderAll();
        });
        document.getElementById('newGameBtn').addEventListener('click', () => {
          gameState = createStarterGame();
          saveGame();
          logEvent('New game created.');
          renderAll();
        });

        document.getElementById('marketList').addEventListener('click', (event) => {
          const buyId = event.target.dataset.buy;
          if (buyId) buyHorse(Number(buyId));
        });

        document.getElementById('horsesList').addEventListener('click', (event) => {
          const horseId = event.target.dataset.train;
          const level = event.target.dataset.level;
          if (horseId && level) trainHorse(Number(horseId), level);
        });

        document.getElementById('breedingPairs').addEventListener('click', (event) => {
          const mareId = event.target.dataset.breed;
          const stallionId = event.target.dataset.stallion;
          if (mareId && stallionId) breedPair(Number(mareId), Number(stallionId));
        });
      });
    </script>
  </body>
</html>
